name: Refresh Claude Pulse data

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Refresh data
        run: node scripts/fetch-updates.mjs
      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain data/updates.json)" ]]; then
            git config user.name "claude-pulse-bot"
            git config user.email "bot@users.noreplace.github.com"
            git add data/updates.json
            git commit -m "chore: refresh Claude Pulse data ($(date -u +%F))"
            git push
          else
            echo "No changes."
          fi
